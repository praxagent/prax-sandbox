name: prax-sandbox

# Standalone sandbox for any harness. `docker compose up` and drive it from your
# harness via the prax_sandbox_client.SandboxClient (point SandboxConfig.host at
# this container, e.g. "localhost" with the published ports below).
services:
  sandbox:
    build:
      context: ./sandbox
    image: prax-sandbox:latest
    restart: unless-stopped
    # No model API keys are passed into the sandbox by default. The AI
    # coding-agent CLIs were removed, so nothing here calls a model — and a
    # keyless container closes the credential-exfiltration surface (a code-exec
    # tool reading env keys + egress). A user who installs a coding-agent CLI
    # themselves can add a DEDICATED, spend-capped key here — never the primary.
    # See prax docs/security/sandbox-execution-boundary.md.
    # Bound to localhost only — these endpoints are UNAUTHENTICATED. Never
    # expose them to a network; for remote access run the daemon instead
    # (docker-compose.remote.yml).
    ports:
      - "127.0.0.1:9223:9223"   # Chrome DevTools Protocol
      - "127.0.0.1:6080:6080"   # noVNC desktop
      - "127.0.0.1:6090:6090"   # clipboard bridge
    volumes:
      - ${WORKSPACE_DIR:-./workspace}:/workspace
    healthcheck:
      test: ["CMD-SHELL", "pgrep -x supervisord || exit 1"]
      interval: 5s
      timeout: 3s
      start_period: 15s
      retries: 5
